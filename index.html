<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Barber Admin v60.7</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #111827; --a: #fbbf24; --s: #059669; --d: #dc2626; --bg: #f3f4f6; --c: #ffffff; --t: #1f2937; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--t); margin: 0; }
        nav { background: var(--p); padding: 0 5%; display: flex; align-items: center; justify-content: space-between; height: 75px; border-bottom: 4px solid var(--a); position: sticky; top:0; z-index: 1000; }
        .nav-brand { color: white; font-size: 24px; font-weight: 900; }
        .nav-brand span { color: var(--a); }
        .tab-btn { background: none; color: #9ca3af; border: none; padding: 25px 20px; cursor: pointer; font-weight: 700; font-size: 13px; text-transform: uppercase; }
        .tab-btn.active { color: var(--a); box-shadow: inset 0 -4px 0 var(--a); }
        .container { max-width: 1500px; margin: 30px auto; padding: 0 25px; }
        .main-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 30px; }
        .card { background: var(--c); border-radius: 16px; border: 1px solid #e5e7eb; margin-bottom: 25px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-h { padding: 18px 20px; background: #f9fafb; border-bottom: 1px solid #f3f4f6; font-weight: 800; font-size: 14px; color: var(--p); display: flex; justify-content: space-between; }
        .card-b { padding: 20px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fff; border-radius: 12px; margin-bottom: 10px; border: 1px solid #f3f4f6; }
        .btn { padding: 14px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: 0.2s; }
        .btn-p { background: var(--p); color: white; }
        .btn-a { background: var(--a); color: var(--p); }
        .btn-s { background: var(--s); color: white; }
        .btn-d { background: var(--d); color: white; }
        input, select { width: 100%; padding: 12px; border: 2px solid #f3f4f6; border-radius: 10px; margin-bottom: 15px; }
        .hidden { display: none; }
        .modal { position:fixed; inset:0; background:rgba(17, 24, 39, 0.8); display:none; align-items:center; justify-content:center; z-index:2000; backdrop-filter: blur(4px); }
        .silla-card { background: white; border-radius: 20px; padding: 25px; border: 1px solid #e5e7eb; text-align: center; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-any { background: #e0f2fe; color: #0369a1; }
        .badge-spec { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">ELITE<span>BARBER</span></div>
    <div style="display:flex">
        <button class="tab-btn active" onclick="app.tab('atencion', this)">Atención</button>
        <button class="tab-btn" onclick="app.tab('caja', this)">Caja Pro</button>
        <button class="tab-btn" onclick="app.tab('config', this)">Ajustes</button>
    </div>
</nav>

<div class="container">
    <div id="t-atencion" class="main-grid">
        <aside>
            <div class="card"><div class="card-h">Barberos en Turno</div><div id="listaBarberos" class="card-b"></div></div>
            <div class="card"><div class="card-h">Entrada</div><div id="btnEntradas" class="card-b" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px"></div></div>
        </aside>
        <main>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h2 style="margin:0">Sillas Activas</h2>
                <button onclick="app.next()" class="btn btn-a" style="width:auto; padding: 12px 30px">SIGUIENTE <i class="fas fa-play"></i></button>
            </div>
            <div id="sillas" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:20px"></div>
        </main>
        <aside>
            <div class="card" style="border-top: 5px solid var(--a)"><div class="card-h">Recepción</div>
                <div class="card-b">
                    <input id="inName" placeholder="Nombre Cliente">
                    <select id="inServ" onchange="app.upPrice()"></select>
                    <input id="inPrice" type="number" placeholder="Precio $">
                    <select id="inTarget"></select>
                    <button onclick="app.reg()" class="btn btn-p">A COLA</button>
                </div>
            </div>
            <div class="card"><div class="card-h">En Espera (<span id="waitCount">0</span>)</div><div id="cola" class="card-b"></div></div>
        </aside>
    </div>

    <div id="t-caja" class="hidden">
        <div style="display:grid; grid-template-columns: 1fr 380px; gap:30px">
            <div>
                <div class="card"><div class="card-h">Rango de Fecha</div>
                    <div class="card-b" style="display:flex; gap:10px"><input type="date" id="dS"><input type="date" id="dE"><button onclick="app.renderCaja()" class="btn btn-p">Filtrar</button></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px">
                    <div class="card"><div class="card-h">Ranking Barberos</div><div id="ranking" class="card-b"></div></div>
                    <div class="card"><div class="card-h">Movimientos</div><div id="movimientos" class="card-b" style="max-height: 400px; overflow-y: auto;"></div></div>
                </div>
            </div>
            <aside>
                <div class="card" style="background:var(--p); color:white; border:none">
                    <div class="card-b">
                        <h3 style="color:var(--a)">CONTABILIDAD</h3>
                        <div id="resV" style="font-size:22px; font-weight:900">Ventas: $0</div>
                        <div id="resG" style="font-size:22px; font-weight:900; color:var(--d); margin: 10px 0">Gastos: $0</div>
                        <hr style="opacity:0.1">
                        <div id="resN" style="font-size:36px; font-weight:900; color:var(--a)">$0</div>
                        <button onclick="app.openModal('mGasto')" class="btn btn-d" style="margin-top:20px">GASTO</button>
                        <button onclick="app.preCierre()" class="btn btn-s" style="margin-top:10px">CERRAR DÍA</button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div id="t-config" class="hidden">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px">
            <div class="card"><div class="card-h">Barberos</div><div id="editB" class="card-b"></div>
                <div class="card-b"><input id="newBN" placeholder="Nombre"><input id="newBC" type="number" placeholder="%"><button onclick="app.addB()" class="btn btn-p">Añadir</button></div>
            </div>
            <div class="card"><div class="card-h">Servicios</div><div id="editS" class="card-b"></div>
                <div class="card-b"><input id="newSN" placeholder="Servicio"><input id="newSP" type="number" placeholder="$"><button onclick="app.addS()" class="btn btn-p">Añadir</button></div>
            </div>
        </div>
    </div>
</div>

<div id="mBarbero" class="modal"><div class="card" style="width:300px"><div class="card-h" id="mtB"></div><div id="maB" class="card-b"></div></div></div>
<div id="mGasto" class="modal"><div class="card" style="width:300px"><div class="card-b"><input id="gd" placeholder="Motivo"><input id="ga" type="number"><button onclick="app.regGasto()" class="btn btn-d">Guardar</button></div></div></div>
<div id="mPago" class="modal"><div class="card" style="width:320px"><div class="card-b" style="text-align:center"><h2 id="pt"></h2><input id="pv" type="number" style="font-size:30px; text-align:center"><button onclick="app.pagar('Efectivo')" class="btn btn-s">Confirmar Cobro</button></div></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD_JVR7IFFXEFEZxol_-GwKZ2jwF5lN9mI",
      authDomain: "barberia-99e38.firebaseapp.com",
      databaseURL: "https://barberia-99e38-default-rtdb.firebaseio.com",
      projectId: "barberia-99e38",
      storageBucket: "barberia-99e38.firebasestorage.app",
      messagingSenderId: "545000330214",
      appId: "1:545000330214:web:51ce54aa0c399627a77c27"
    };

    const fApp = initializeApp(firebaseConfig);
    const db = getDatabase(fApp);
    const dbRef = ref(db, 'barber_data');
    const passAdmin = "1234"; // CAMBIA TU CONTRASEÑA AQUÍ

    window.app = {
        db: { barberos: [], servicios: [], espera: [], activos: [], hoy: [], turnos: [], status: {}, cierres: [] },

        async save() { await set(dbRef, this.db); },

        init() {
            onValue(dbRef, (s) => { 
                if(s.val()){ 
                    this.db = s.val(); 
                    this.db.barberos = this.db.barberos || [];
                    this.db.servicios = this.db.servicios || [];
                    this.render(); 
                    if(!document.getElementById('t-caja').classList.contains('hidden')) this.renderCaja();
                } 
            });
            const d = new Date().toISOString().split('T')[0];
            document.getElementById('dS').value = d; document.getElementById('dE').value = d;
        },

        tab(t, b) {
            if(t === 'config' || t === 'caja') {
                const pass = prompt("Introduce la contraseña de Administrador:");
                if(pass !== passAdmin) return alert("Acceso denegado");
            }
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); b.classList.add('active');
            ['t-atencion', 't-caja', 't-config'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(`t-${t}`).classList.remove('hidden');
            if(t==='caja') this.renderCaja();
        },

        openModal(id){ document.getElementById(id).style.display='flex'; },
        closeM(){ document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); },

        mB(n){ 
            this.tmpB = n; const s = this.db.status[n];
            document.getElementById('mtB').innerText = n;
            document.getElementById('maB').innerHTML = `<button onclick="app.setS('${s==='Descanso'?'Activo':'Descanso'}')" class="btn btn-a">${s==='Descanso'?'Activar':'Descanso'}</button><button onclick="app.setS('Salida')" class="btn btn-d" style="margin-top:10px">Salida</button>`;
            this.openModal('mBarbero');
        },

        setS(s){ if(s==='Salida'){ this.db.turnos = this.db.turnos.filter(x=>x!==this.tmpB); delete this.db.status[this.tmpB]; } else { this.db.status[this.tmpB]=s; } this.closeM(); this.save(); },

        reg(){
            const n=document.getElementById('inName').value, p=document.getElementById('inPrice').value;
            if(!n||!p) return;
            this.db.espera.push({id:Date.now(), name:n, price:parseInt(p), serv:document.getElementById('inServ').value, target:document.getElementById('inTarget').value});
            document.getElementById('inName').value=""; this.save();
        },

        next(){
            const busy = (this.db.activos || []).map(a=>a.barber);
            const free = (this.db.turnos || []).filter(n=>!busy.includes(n) && (this.db.status[n]||'Activo')==='Activo');
            if(!free.length || !this.db.espera.length) return alert("No hay disponibilidad");
            const idx = this.db.espera.findIndex(c=>c.target==='any' || free.includes(c.target));
            if(idx===-1) return alert("Barbero solicitado ocupado");
            const c = this.db.espera.splice(idx,1)[0];
            this.db.activos.push({...c, barber: c.target==='any'?free[0]:c.target});
            this.save();
        },

        cobrar(i){ this.tmpI=i; document.getElementById('pt').innerText=this.db.activos[i].name; document.getElementById('pv').value=this.db.activos[i].price; this.openModal('mPago'); },
        pagar(m){
            const it = this.db.activos.splice(this.tmpI,1)[0];
            this.db.hoy.push({...it, price:parseInt(document.getElementById('pv').value), m, t:Date.now()});
            this.db.turnos = this.db.turnos.filter(x=>x!==it.barber); this.db.turnos.push(it.barber);
            this.closeM(); this.save();
        },

        renderCaja(){
            const h = this.db.hoy || [];
            const stats = {};
            h.filter(x=>x.barber).forEach(x=>stats[x.barber]=(stats[x.barber]||0)+x.price);
            const r = Object.entries(stats).sort((a,b)=>b[1]-a[1]);
            document.getElementById('ranking').innerHTML = r.map(([b,v])=>`<div class="item-row"><b>${b}</b> <span>$${v}</span></div>`).join('') || "Sin ventas";
            document.getElementById('movimientos').innerHTML = h.map(m=>`<div style="font-size:11px; padding:5px; border-bottom:1px solid #eee">${m.type==='GASTO'?'🔴':'🟢'} ${m.serv||m.desc}: $${m.price}</div>`).reverse().join('');
            const v = h.filter(x=>x.barber).reduce((s,x)=>s+x.price,0);
            const g = h.filter(x=>x.type==='GASTO').reduce((s,x)=>s+x.price,0);
            document.getElementById('resV').innerText = `Ventas: $${v}`;
            document.getElementById('resG').innerText = `Gastos: $${g}`;
            document.getElementById('resN').innerText = `$${v-g}`;
        },

        addB(){ const n=document.getElementById('newBN').value; if(n){this.db.barberos.push({n,c:50}); this.save(); document.getElementById('newBN').value="";}},
        addS(){ const n=document.getElementById('newSN').value, p=document.getElementById('newSP').value; if(n&&p){this.db.servicios.push({n,p:parseInt(p)}); this.save(); document.getElementById('newSN').value=""; document.getElementById('newSP').value="";}},

        render(){
            const busy = (this.db.activos || []).map(a=>a.barber);
            document.getElementById('listaBarberos').innerHTML = (this.db.turnos || []).map(n=>`<div onclick="app.mB('${n}')" class="item-row"><b>${n}</b> <small>${busy.includes(n)?'OCUPADO':(this.db.status[n]||'Activo')}</small></div>`).join('');
            document.getElementById('btnEntradas').innerHTML = (this.db.barberos || []).filter(b=>!(this.db.turnos || []).includes(b.n)).map(b=>`<button onclick="app.db.turnos.push('${b.n}');app.db.status['${b.n}']='Activo';app.save()" class="btn btn-p">${b.n}</button>`).join('');
            document.getElementById('sillas').innerHTML = (this.db.activos || []).map((a,i)=>`<div class="silla-card"><small>${a.barber}</small><h3>${a.name}</h3><button onclick="app.cobrar(${i})" class="btn btn-s">COBRAR</button></div>`).join('');
            document.getElementById('waitCount').innerText = (this.db.espera || []).length;
            document.getElementById('cola').innerHTML = (this.db.espera || []).map(c=>`<div class="item-row"><b>${c.name}</b> <span class="badge ${c.target==='any'?'badge-any':'badge-spec'}">${c.target}</span></div>`).join('');
            document.getElementById('inServ').innerHTML = (this.db.servicios || []).map(s=>`<option value="${s.n}">${s.n}</option>`).join('');
            document.getElementById('inTarget').innerHTML = '<option value="any">Cualquiera</option>' + (this.db.barberos || []).map(b=>`<option value="${b.n}">${b.n}</option>`).join('');
            document.getElementById('editB').innerHTML = (this.db.barberos || []).map((b,i)=>`<div class="item-row">${b.n} <button onclick="app.db.barberos.splice(${i},1);app.save()">×</button></div>`).join('');
            document.getElementById('editS').innerHTML = (this.db.servicios || []).map((s,i)=>`<div class="item-row">${s.n} <button onclick="app.db.servicios.splice(${i},1);app.save()">×</button></div>`).join('');
        },
        upPrice(){ const s=this.db.servicios.find(x=>x.n===document.getElementById('inServ').value); if(s) document.getElementById('inPrice').value=s.p; },
        regGasto(){ const d=document.getElementById('gd').value, a=document.getElementById('ga').value; if(d&&a){this.db.hoy.push({type:'GASTO', desc:d, price:parseInt(a), t:Date.now()}); this.closeM(); this.save();}},
        preCierre(){ if(confirm("¿Cerrar día?")){ this.db.cierres.push({t:Date.now(), d:[...this.db.hoy]}); this.db.hoy=[]; this.save(); alert("Cerrado."); }}
    };
    app.init();
</script>
</body>
</html>
